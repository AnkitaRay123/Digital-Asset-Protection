services:
  - type: web
    name: digital-asset-protection-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT backend.app:app
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        value: your_mongodb_atlas_connection_string
      - key: FLASK_ENV
        value: production
